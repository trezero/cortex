# Docker Compose overview:
# - Default (no profile): Starts cortex-server, cortex-mcp, cortex-agents, and cortex-frontend
# Usage:
#   docker compose up  # Starts server, mcp, agents, frontend

services:
  # Server Service (FastAPI + Socket.IO + Crawling)
  cortex-server:
    build:
      context: ./python
      dockerfile: Dockerfile.server
      args:
        BUILDKIT_INLINE_CACHE: 1
        CORTEX_SERVER_PORT: ${CORTEX_SERVER_PORT:-8181}
    container_name: cortex-server
    restart: unless-stopped
    ports:
      - "${CORTEX_SERVER_PORT:-8181}:${CORTEX_SERVER_PORT:-8181}"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN:-}
      - SERVICE_DISCOVERY_MODE=docker_compose
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORTEX_SERVER_PORT=${CORTEX_SERVER_PORT:-8181}
      - CORTEX_MCP_PORT=${CORTEX_MCP_PORT:-8051}
      - CORTEX_AGENTS_PORT=${CORTEX_AGENTS_PORT:-8052}
      - AGENTS_ENABLED=${AGENTS_ENABLED:-false}
      - CORTEX_HOST=${CORTEX_HOST:-localhost}
    networks:
      - app-network
      - default  # Connects to supabase_default network
    volumes:
      # SECURITY: Docker socket mounting removed (CVE-2025-9074 - CVSS 9.3)
      # MCP status now monitored via HTTP health checks (secure, portable)
      # To re-enable Docker socket mode (not recommended):
      #   1. Set ENABLE_DOCKER_SOCKET_MONITORING=true in .env
      #   2. Uncomment the line below
      # - /var/run/docker.sock:/var/run/docker.sock # SECURITY RISK: root-equivalent host access
      - ./python/src:/app/src # Mount source code for hot reload
      - ./python/tests:/app/tests # Mount tests for UI test execution
      - ./migration:/app/migration # Mount migration files for version tracking
      - ./integrations:/app/integrations # Bundled skills for registry seeding
      - cortex-server-data:/app/data # Persistent data storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "src.server.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "${CORTEX_SERVER_PORT:-8181}",
        "--reload",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:${CORTEX_SERVER_PORT:-8181}/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Lightweight MCP Server Service (HTTP-based)
  cortex-mcp:
    build:
      context: ./python
      dockerfile: Dockerfile.mcp
      args:
        BUILDKIT_INLINE_CACHE: 1
        CORTEX_MCP_PORT: ${CORTEX_MCP_PORT:-8051}
    container_name: cortex-mcp
    restart: unless-stopped
    ports:
      - "${CORTEX_MCP_PORT:-8051}:${CORTEX_MCP_PORT:-8051}"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN:-}
      - SERVICE_DISCOVERY_MODE=docker_compose
      - TRANSPORT=sse
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # MCP needs to know where to find other services
      - API_SERVICE_URL=http://cortex-server:${CORTEX_SERVER_PORT:-8181}
      - AGENTS_ENABLED=${AGENTS_ENABLED:-false}
      - AGENTS_SERVICE_URL=${AGENTS_SERVICE_URL:-http://cortex-agents:${CORTEX_AGENTS_PORT:-8052}}
      - CORTEX_MCP_PORT=${CORTEX_MCP_PORT:-8051}
      - CORTEX_SERVER_PORT=${CORTEX_SERVER_PORT:-8181}
      - CORTEX_AGENTS_PORT=${CORTEX_AGENTS_PORT:-8052}
      - CORTEX_HOST=${CORTEX_HOST:-localhost}
    networks:
      - app-network
      - default  # Connects to supabase_default network
    volumes:
      - cortex-mcp-data:/app/data # Persistent data storage
      - ./python/src:/app/src # Mount source code for hot reload
      - ./integrations:/app/integrations # Setup script templates
    depends_on:
      cortex-server:
        condition: service_healthy
      
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          'python -c "import socket; s=socket.socket(); s.connect((''localhost'', ${CORTEX_MCP_PORT:-8051})); s.close()"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s # Give dependencies time to start

  # AI Agents Service (ML/Reranking)
  cortex-agents:
    build:
      context: ./python
      dockerfile: Dockerfile.agents
      args:
        BUILDKIT_INLINE_CACHE: 1
        CORTEX_AGENTS_PORT: ${CORTEX_AGENTS_PORT:-8052}
    container_name: cortex-agents
    restart: unless-stopped
    ports:
      - "${CORTEX_AGENTS_PORT:-8052}:${CORTEX_AGENTS_PORT:-8052}"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN:-}
      - SERVICE_DISCOVERY_MODE=docker_compose
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORTEX_AGENTS_PORT=${CORTEX_AGENTS_PORT:-8052}
      - CORTEX_SERVER_PORT=${CORTEX_SERVER_PORT:-8181}
    networks:
      - app-network
      - default  # Connects to supabase_default network
    volumes:
      - cortex-agents-data:/app/data # Persistent data storage
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:${CORTEX_AGENTS_PORT:-8052}/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  cortex-frontend:
    build: ./cortex-ui
    container_name: cortex-ui
    restart: unless-stopped
    ports:
      - "${CORTEX_UI_PORT:-3737}:3737"
    environment:
      # Don't set VITE_API_URL so frontend uses relative URLs through proxy
      # - VITE_API_URL=http://${HOST:-localhost}:${CORTEX_SERVER_PORT:-8181}
      - VITE_CORTEX_SERVER_PORT=${CORTEX_SERVER_PORT:-8181}
      - CORTEX_SERVER_PORT=${CORTEX_SERVER_PORT:-8181}
      - HOST=${HOST:-localhost}
      - CORTEX_HOST=${CORTEX_HOST:-localhost}
      - PROD=${PROD:-false}
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-}
      - VITE_SHOW_DEVTOOLS=${VITE_SHOW_DEVTOOLS:-false}
      - DOCKER_ENV=true
    networks:
      - app-network
      - default  # Connects to supabase_default network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3737"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./cortex-ui/src:/app/src
      - ./cortex-ui/public:/app/public
      - cortex-ui-data:/app/data # Persistent data storage
    depends_on:
      cortex-server:
        condition: service_healthy

  # Trinity A2UI Generation Service (Second Brain)
  trinity-a2ui:
    profiles:
      - trinity
    build:
      context: ../second-brain-research-dashboard/agent
      dockerfile: Dockerfile
    container_name: trinity-a2ui
    restart: unless-stopped
    ports:
      - "${A2UI_PORT:-8054}:8054"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${A2UI_MODEL:-anthropic/claude-haiku-4-5-20251001}
      - A2UI_MAX_COMPONENTS=${A2UI_MAX_COMPONENTS:-20}
      - A2UI_TIMEOUT=${A2UI_TIMEOUT:-10}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8054/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Cloudflare Tunnel — publishes Cortex at https://cortex.persalto.io.
  # Access to that hostname is gated at the Cloudflare edge by a Cloudflare Access
  # service-auth policy (per-machine service tokens); this daemon only carries traffic.
  # Ingress (path -> service) is configured remotely on the tunnel, routing:
  #   /mcp, /cortex-setup -> cortex-mcp:8051 | /api, /socket.io -> cortex-server:8181
  #   /agents -> cortex-agents:8052 | everything else -> cortex-ui:3737
  # Starts only with the "tunnel" profile: docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cortex-cloudflared
    profiles:
      - tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CORTEX_TUNNEL_TOKEN}
    networks:
      - app-network
    depends_on:
      - cortex-server
      - cortex-mcp
      - cortex-frontend

networks:
  app-network:
    driver: bridge
  # Use external Supabase network for database connectivity
  # This allows cortex containers to communicate with Supabase services
  default:
    name: supabase_default
    external: true

volumes:
  cortex-server-data:
    name: cortex-server-data
  cortex-mcp-data:
    name: cortex-mcp-data
  cortex-agents-data:
    name: cortex-agents-data
  cortex-ui-data:
    name: cortex-ui-data
